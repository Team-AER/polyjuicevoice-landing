<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PolyJuiceVoice — On-device TTS for macOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; padding: 0; background: #08080a; color: #fff; font-family: Geist, ui-sans-serif, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  body { background-color: #08080a; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 24px 24px; background-position: 0 0; }
  ::selection { background: #1da7ff; color: #fff; }
  button { font-family: inherit; }
  input { font-family: inherit; }
  input[type="range"] { -webkit-appearance: none; appearance: none; height: 2px; background: rgba(255,255,255,0.15); }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; }
  @keyframes cantis-marquee { from { transform: translateX(0); } to { transform: translateX(-33.333%); } }

  /* ===== Responsive Layout ===== */
  .lp-nav-links { display: flex; }
  .lp-nav-ctas { display: flex; align-items: center; gap: 12px; }
  .lp-nav-hamburger { display: none; background: transparent; border: none; color: rgba(255,255,255,0.7); cursor: pointer; padding: 4px; align-items: center; justify-content: center; }
  .lp-mobile-menu { display: none; }

  @media (max-width: 900px) {
    /* Navigation */
    .lp-nav-links { display: none !important; }
    .lp-nav-ctas { display: none !important; }
    .lp-nav-hamburger { display: flex !important; margin-left: auto; }
    .lp-mobile-menu.open {
      display: flex; flex-direction: column;
      background: rgba(8,8,10,0.98); backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.04);
      padding: 8px 24px 16px; gap: 2px;
    }

    /* Grids collapse to single column */
    .lp-grid-2 { grid-template-columns: 1fr !important; }
    .lp-grid-3 { grid-template-columns: 1fr !important; }
    .lp-specs-inner { grid-template-columns: 1fr !important; }

    /* Remove border-right when stacked */
    .lp-grid-2 > div, .lp-grid-3 > div, .lp-specs-inner > div { border-right: none !important; }
    .lp-specs-inner > div { padding: 28px 24px !important; }

    /* Typography */
    .lp-hero-title { font-size: 52px !important; }
    .lp-cta-title { font-size: 58px !important; line-height: 1 !important; }
    .lp-title-56 { font-size: 36px !important; }
    .lp-title-44 { font-size: 30px !important; }

    /* Padding */
    .lp-hero-left-pad { padding: 44px 24px 40px !important; }
    .lp-hero-right { padding: 24px 20px !important; }
    .lp-feat-cell { padding: 28px 20px !important; }
    .lp-spec-left { padding: 32px 24px !important; }
    .lp-studio-padding { padding: 48px 20px !important; }
    .lp-cta-section { padding: 72px 24px !important; }

    /* Studio demo app window */
    .lp-studio-header { flex-direction: column !important; align-items: flex-start !important; gap: 16px !important; margin-bottom: 28px !important; }
    .lp-app-cols { grid-template-columns: 1fr !important; min-height: auto !important; }
    .lp-app-sidebar { display: none !important; }
    .lp-caption-grid { grid-template-columns: 1fr !important; gap: 20px !important; }

    /* Footer */
    .lp-footer-grid { grid-template-columns: 1fr 1fr !important; }
  }

  @media (max-width: 480px) {
    .lp-hero-title { font-size: 40px !important; }
    .lp-cta-title { font-size: 44px !important; }
    .lp-footer-grid { grid-template-columns: 1fr !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="illustrations.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accent": "#1da7ff",
    "showGrid": true
  }/*EDITMODE-END*/;

  function App() {
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const accent = tweaks.accent;

    React.useEffect(() => {
      document.body.style.backgroundImage = tweaks.showGrid
        ? 'radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px)'
        : 'none';
    }, [tweaks.showGrid]);

    return (
      <div style={{ minHeight: '100vh' }}>
        <TopNav accent={accent} />
        <Hero accent={accent} />
        <Marquee />
        <FeatureGrid accent={accent} />
        <StudioDemo accent={accent} />
        <Specs accent={accent} />
        <Cta accent={accent} />
        <Footer />

        <TweaksPanel title="Tweaks">
          <TweakSection label="Accent">
            <TweakColor label="Hue" value={tweaks.accent} onChange={(v) => setTweak('accent', v)} />
            <TweakRadio
              label="Presets"
              value={tweaks.accent}
              onChange={(v) => setTweak('accent', v)}
              options={[
                { value: '#1da7ff', label: 'Sky' },
                { value: '#a855f7', label: 'Violet' },
                { value: '#ff5b2c', label: 'Ember' },
                { value: '#7af0a8', label: 'Mint' },
              ]}
            />
          </TweakSection>
          <TweakSection label="Background">
            <TweakToggle label="Dot grid" value={tweaks.showGrid} onChange={(v) => setTweak('showGrid', v)} />
          </TweakSection>
        </TweaksPanel>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
