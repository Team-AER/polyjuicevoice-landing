# Host nginx reverse proxy for the PolyJuiceVoice landing site.
# Proxies to the Dockerized nginx on 127.0.0.1:8082.
#
# TLS is terminated here by a Let's Encrypt certificate; certbot manages the
# 443 block + the HTTP->HTTPS redirect (the "# managed by Certbot" lines).
# Obtained on the server with:
#   certbot --nginx -d polyjuicevoice.aer.app --redirect
# Renewal is automatic via the system certbot.timer.
#
# Install on the server as:
#   /etc/nginx/sites-available/polyjuicevoice.aer.app
#   ln -s ../sites-available/polyjuicevoice.aer.app /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
server {
    server_name polyjuicevoice.aer.app;

    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/polyjuicevoice.aer.app/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/polyjuicevoice.aer.app/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = polyjuicevoice.aer.app) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name polyjuicevoice.aer.app;
    return 404; # managed by Certbot
}
