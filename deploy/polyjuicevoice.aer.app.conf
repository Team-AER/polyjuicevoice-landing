# Host nginx reverse proxy for the PolyJuiceVoice landing site.
# Proxies to the Dockerized nginx on 127.0.0.1:8082.
#
# TLS is terminated here by a Let's Encrypt certificate; certbot manages the
# 443 block + the HTTP->HTTPS redirect. Obtain on the server with:
#   certbot --nginx -d polyjuicevoice.aer.app --redirect
# (requires polyjuicevoice.aer.app DNS -> 140.238.224.122 first).
# Renewal is automatic via the system certbot.timer.
#
# Install on the server as:
#   /etc/nginx/sites-available/polyjuicevoice.aer.app
#   ln -s ../sites-available/polyjuicevoice.aer.app /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
server {
    listen 80;
    listen [::]:80;
    server_name polyjuicevoice.aer.app;

    server_tokens off;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
